<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quest | Quiz Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .bg-gradient-animate {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .option-card { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .option-card:hover:not(.selected) { transform: translateY(-4px); background: white; }
        .modal-enter { animation: modalEnter 0.5s ease-out forwards; }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .image-pop { animation: imagePop 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        @keyframes imagePop { 0% { transform: scale(0.5) rotate(0deg); opacity: 0; } 50% { transform: scale(1.1) rotate(5deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
    </style>
</head>
<body class="bg-gradient-animate min-h-screen text-slate-900 overflow-x-hidden p-6 flex flex-col">

    <div id="game-container" class="max-w-4xl mx-auto w-full flex-grow flex flex-col">
        <nav class="flex justify-between items-center w-full mb-8 fade-in">
            <div class="flex gap-2">
                <a href="index.html" class="glass px-4 py-2 rounded-full font-bold text-slate-700 hover:bg-white transition-colors">✕ Sair</a>
                <button onclick="toggleTheme()" class="glass px-4 py-2 rounded-full font-bold text-indigo-600 hover:bg-white transition-colors">
                    🔄 Tema: <span id="theme-name">Pronomes</span>
                </button>
            </div>
            <div class="glass px-6 py-2 rounded-full font-bold">
                <span id="score-display" class="text-indigo-600">00</span> <span class="text-slate-400">Pontos</span>
            </div>
        </nav>

        <main class="flex-grow flex flex-col items-center justify-center fade-in">
            <header class="text-center mb-12">
                <span class="bg-white/20 text-white px-4 py-1 rounded-full text-xs font-bold tracking-widest uppercase mb-4 inline-block backdrop-blur-md">Traduza para o Inglês</span>
                <h1 id="word-display" class="text-5xl md:text-7xl font-black text-white drop-shadow-lg py-4">--</h1>
            </header>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl"></div>
        </main>

        <footer class="mt-12 flex flex-col items-center gap-6 fade-in">
            <div id="feedback-container" class="opacity-0 transition-all duration-500 transform translate-y-4">
                <p id="feedback-text" class="text-xl font-extrabold text-white drop-shadow-md text-center"></p>
            </div>
            <button id="next-btn" onclick="nextQuestion()" class="hidden glass px-12 py-4 rounded-2xl font-black text-xl text-indigo-600 hover:bg-white transition-all transform active:scale-95 shadow-xl">
                PRÓXIMA PERGUNTA →
            </button>
        </footer>
    </div>

    <div id="win-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="glass p-10 rounded-[3rem] max-w-lg w-full text-center shadow-2xl modal-enter">
            <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Congratulations!</h2>
            <p class="text-xl text-slate-700 mb-6">You're a Quiz Master! You've reached 100 points!</p>
            <img id="congratulations-image" src="" alt="Congratulations!" class="image-pop w-48 h-48 object-cover rounded-full mx-auto mb-6 border-4 border-white shadow-lg">
            <button onclick="resetGame()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg active:scale-95 uppercase tracking-wider">Play Again!</button>
        </div>
    </div>

    <script>
        const congratulations_images = [
            'https://img.freepik.com/fotos-premium/close-up-do-macaco-mixedbreed-entre-o-chimpanze-e-o-bonobo-sorrindo_191971-22824.jpg?w=740',
            'https://i.pinimg.com/736x/87/fb/5f/87fb5fe01275c5d32ce22f0e22f18e7a.jpg',
            'https://media.istockphoto.com/id/184941527/pt/foto/macho-chimpanz%C3%A9-em-roupas-de-neg%C3%B3cios.jpg?s=612x612&w=0&k=20&c=8fHBikTJvW-DRyCT1gj0RoB86YAH6oy99rFAFaYZBG8='
        ];

        // CONFIGURAÇÃO DOS TEMAS
        const themes = {
            pronouns: {
                name: "Pronouns",
                data: [
                    { pt: "Eu", en: "I" }, { pt: "Você", en: "You" }, { pt: "Ele", en: "He" },
                    { pt: "Ela", en: "She" }, { pt: "Isto", en: "It" }, { pt: "Nós", en: "We" },
                    { pt: "Eles/Elas", en: "They" }
                ]
            },
            greetings: {
                name: "Expressions",
                data: [
                    { en: "Hello", pt: "Olá!" },
                    { en: "What’s new?", pt: "Novidades?" },
                    { en: "Good night!", pt: "Boa noite (despedida)!" },
                    { en: "Please!", pt: "Por favor!" },
                    { en: "See you tomorrow!", pt: "Até amanhã!" },
                    { en: "How are you?", pt: "Como você está?" },
                    { en: "Thank you!", pt: "Obrigado(a)!" },
                    { en: "Good afternoon!", pt: "Boa tarde!" },
                    { en: "Long time no see you!", pt: "Há quanto tempo!" },
                    { en: "You’re welcome!", pt: "De nada" },
                    { en: "See you later!", pt: "Até logo!" },
                    { en: "Sorry!", pt: "Desculpa" },
                    { en: "What’s up?", pt: "E aí?" },
                    { en: "Nice to meet you!", pt: "Prazer em conhecer você!" },
                    { en: "Have a good day!", pt: "Tenha um bom dia!" },
                    { en: "Anytime!", pt: "Disponha / Sempre às ordens!" },
                    { en: "Great to see you again!", pt: "Que bom te ver de novo!" },
                    { en: "See you soon!", pt: "Até mais!" }
                ]
            }
        };

        let currentTheme = 'pronouns';
        let current = {};
        let score = 0;

        function toggleTheme() {
            currentTheme = (currentTheme === 'pronouns') ? 'greetings' : 'pronouns';
            document.getElementById('theme-name').innerText = themes[currentTheme].name;
            resetGame();
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function nextQuestion() {
            document.getElementById('next-btn').classList.add('hidden');
            const feedback = document.getElementById('feedback-container');
            feedback.classList.add('opacity-0', 'translate-y-4');
            
            const activeData = themes[currentTheme].data;
            current = activeData[Math.floor(Math.random() * activeData.length)];
            
            // Ajuste de tamanho de fonte para frases longas
            const display = document.getElementById('word-display');
            display.innerText = current.pt;
            display.className = current.pt.length > 15 ? "text-3xl md:text-5xl font-black text-white drop-shadow-lg py-4" : "text-5xl md:text-7xl font-black text-white drop-shadow-lg py-4";

            let choices = [current.en];
            while (choices.length < 4 && choices.length < activeData.length) {
                let r = activeData[Math.floor(Math.random() * activeData.length)].en;
                if (!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";

            choices.forEach((choice, i) => {
                const card = document.createElement('div');
                card.className = `option-card glass rounded-3xl p-4 md:p-6 flex items-center justify-between cursor-pointer group shadow-lg`;
                
                card.innerHTML = `
                    <div class="flex items-center gap-4 flex-1">
                        <div class="w-10 h-10 shrink-0 rounded-xl bg-slate-900 flex items-center justify-center text-white font-black group-hover:scale-110 transition-transform">
                            ${String.fromCharCode(65 + i)}
                        </div>
                        <span class="text-lg md:text-xl font-extrabold text-slate-800 leading-tight">${choice}</span>
                    </div>
                    <button onclick="event.stopPropagation(); speak('${choice}')" class="p-2 rounded-full hover:bg-indigo-100 text-slate-400 hover:text-indigo-600 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                `;

                card.onclick = () => handleChoice(choice, card);
                grid.appendChild(card);
            });
        }

        function handleChoice(selected, element) {
            const feedback = document.getElementById('feedback-container');
            const feedbackText = document.getElementById('feedback-text');
            const all = document.querySelectorAll('.option-card');
            
            all.forEach(el => el.style.pointerEvents = 'none');
            element.classList.add('selected');

            if (selected === current.en) {
                element.classList.remove('glass');
                element.classList.add('bg-emerald-500', 'text-white');
                element.querySelector('span').classList.replace('text-slate-800', 'text-white');
                element.querySelector('.w-10').classList.replace('bg-slate-900', 'bg-white');
                element.querySelector('.w-10').classList.add('text-emerald-500');
                
                feedbackText.innerText = "✨ Excelente! Pronúncia perfeita.";
                score += 10;
                document.getElementById('score-display').innerText = score.toString().padStart(2, '0');
                speak(selected);

                if (score >= 100) {
                    setTimeout(showCongratulations, 1000);
                    return;
                }
            } else {
                element.classList.add('bg-red-500', 'text-white', 'opacity-80');
                element.querySelector('span').classList.replace('text-slate-800', 'text-white');
                feedbackText.innerText = `O correto seria: ${current.en}`;
            }

            feedback.classList.remove('opacity-0', 'translate-y-4');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function showCongratulations() {
            const modal = document.getElementById('win-modal');
            const imgElement = document.getElementById('congratulations-image');
            imgElement.src = congratulations_images[Math.floor(Math.random() * congratulations_images.length)];
            modal.classList.replace('hidden', 'flex');
        }

        function resetGame() {
            score = 0;
            document.getElementById('score-display').innerText = '00';
            document.getElementById('win-modal').classList.replace('flex', 'hidden');
            nextQuestion();
        }

        nextQuestion();
    </script>
</body>
</html>
